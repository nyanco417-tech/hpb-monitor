<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HPB 空き状況ダッシュボード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e91e63'/><text y='.9em' x='50' text-anchor='middle' font-size='70'>📊</text></svg>">
<style>
:root {
  --pink: #e91e63; --pink-light: #fce4ec;
  --green: #388e3c; --green-light: #e8f5e9;
  --red: #d32f2f; --orange: #f57c00; --yellow: #fbc02d;
  --gray: #888; --bg: #f5f5f5; --card: #fff; --border: #e0e0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif; background: var(--bg); color: #333; font-size: 14px; }

.header { background: linear-gradient(135deg, var(--pink), #c2185b); color: #fff; padding: 12px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.header h1 { font-size: 16px; font-weight: 600; }
.header-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
.header select { padding: 5px 10px; border-radius: 5px; border: none; font-size: 13px; background: rgba(255,255,255,.9); }
.hbtn { background: rgba(255,255,255,.2); color: #fff; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; }
.hbtn:hover { background: rgba(255,255,255,.35); }
.hbtn.active { background: #fff; color: var(--pink); font-weight: bold; }
.date-nav { display: flex; align-items: center; gap: 6px; }
.tabs { display: flex; gap: 3px; }
.tab { padding: 5px 14px; border-radius: 5px 5px 0 0; background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); cursor: pointer; font-size: 12px; border: none; }
.tab.active { background: var(--bg); color: #333; font-weight: bold; }
.nav-section { display: flex; gap: 3px; margin-left: auto; }

.container { max-width: 1300px; margin: 0 auto; padding: 12px; }
.card { background: var(--card); border-radius: 8px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.card h2 { font-size: 14px; color: var(--pink); margin-bottom: 10px; border-bottom: 2px solid var(--pink-light); padding-bottom: 4px; }
.card h3 { font-size: 13px; margin: 10px 0 6px; }

.cal-scroll { overflow-x: auto; }
.cal-grid { display: grid; gap: 1px; background: var(--border); border-radius: 4px; overflow: hidden; font-size: 11px; }
.cal-hdr { background: #f0f0f0; padding: 4px 2px; text-align: center; font-weight: bold; font-size: 10px; }
.cal-hdr.we { background: var(--pink-light); }
.cal-cell { padding: 2px; text-align: center; background: #fff; min-height: 20px; }
.cal-time { background: #fafafa; font-weight: 500; text-align: right; padding-right: 4px; white-space: nowrap; }
.s-avail { background: var(--green-light); color: var(--green); font-weight: bold; }
.s-few { background: #fff3e0; color: var(--orange); font-weight: bold; }
.s-full { background: #ffebee; color: #ccc; }
.s-closed { background: #f9f9f9; color: #ddd; }

.heatmap-grid { display: grid; gap: 1px; background: var(--border); border-radius: 4px; overflow: hidden; font-size: 11px; }
.hm-cell { padding: 6px 4px; text-align: center; font-weight: bold; }
.hm-header { background: #f0f0f0; font-weight: bold; padding: 6px 4px; text-align: center; }

.stbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.stbl th { text-align: left; padding: 6px; border-bottom: 2px solid var(--border); font-size: 11px; color: var(--gray); }
.stbl td { padding: 5px 6px; border-bottom: 1px solid #f0f0f0; }
.bar-bg { background: #eee; border-radius: 3px; height: 16px; position: relative; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.bar-lbl { position: absolute; right: 4px; top: 0; font-size: 10px; color: #555; line-height: 16px; }

.rev-row { display: flex; gap: 10px; flex-wrap: wrap; }
.rev-card { flex: 1; min-width: 140px; background: #fafafa; border-radius: 6px; padding: 10px; text-align: center; }
.rev-card .cnt { font-size: 24px; font-weight: bold; color: var(--pink); }
.rev-card .rt { font-size: 13px; color: var(--orange); }
.rev-card .lbl { font-size: 11px; color: var(--gray); margin-top: 2px; }
.diff-pos { color: var(--green); font-weight: bold; }
.diff-neg { color: var(--red); font-weight: bold; }
.diff-zero { color: var(--gray); }

.fill-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.fill-tbl th { padding: 6px; border-bottom: 2px solid var(--border); text-align: left; font-size: 11px; color: var(--gray); }
.fill-tbl td { padding: 4px 6px; border-bottom: 1px solid #f0f0f0; }

.diff-frame iframe { width: 100%; height: 450px; border: 1px solid var(--border); border-radius: 4px; }

.ss-grid { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; }
.ss-grid img { max-height: 160px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; }
.ss-grid img:hover { box-shadow: 0 2px 6px rgba(0,0,0,.2); }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.85); z-index: 200; justify-content: center; align-items: center; }
.modal.show { display: flex; }
.modal img { max-width: 95%; max-height: 95%; }
.modal .x { position: absolute; top: 12px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; }

.loading { text-align: center; padding: 30px; color: var(--gray); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid var(--pink-light); border-top-color: var(--pink); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .container { padding: 6px; }
  .card { padding: 10px; }
  .rev-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="header">
  <h1>HPB 空き状況ダッシュボード</h1>
  <div class="header-row">
    <div class="date-nav">
      <button class="hbtn" id="prevDate">&larr;</button>
      <select id="dateSelect"></select>
      <button class="hbtn" id="nextDate">&rarr;</button>
    </div>
    <div class="tabs" id="salonTabs"></div>
    <div class="nav-section">
      <button class="hbtn active" data-v="all">全体</button>
      <button class="hbtn" data-v="calendar">カレンダー</button>
      <button class="hbtn" data-v="analysis">分析</button>
      <button class="hbtn" data-v="report">レポート</button>
    </div>
  </div>
</div>

<div class="container" id="content">
  <div class="loading"><div class="spinner"></div><p style="margin-top:6px">読み込み中...</p></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
  <span class="x">&times;</span>
  <img id="modalImg" src="">
</div>

<script>
const BASE = 'data';
// フルスクレイプ対象（予約カレンダー + 口コミ + ブログ）
const SALONS = [
  { name: 'fullmoon', label: 'Full Moon', color: '#9c27b0' },
  { name: 'flower', label: 'Flower Factories', color: '#2196f3' },
  { name: 'lastella', label: 'La.stella', color: '#e91e63' },
  { name: 'sisu', label: 'studio SISU', color: '#00897b' },
  { name: 'cocoparis', label: 'coco paris.', color: '#5c6bc0' },
  { name: 'renecolor', label: 'Renecolor', color: '#8d6e63' },
  { name: 'hiyori', label: 'ひよりスタイリング', color: '#ef6c00' },
];
// 口コミ・ブログのみ追跡
const REVIEW_ONLY = [
  { name: 'stylrelier', label: 'styleRELIER', color: '#78909c' },
  { name: 'andcharm', label: '&charm', color: '#ab47bc' },
  { name: 'bloom', label: 'Bloom.', color: '#26a69a' },
  { name: 'pulip', label: 'Pulip', color: '#7e57c2' },
  { name: 'toiettoi', label: 'Toi et Toi', color: '#ec407a' },
];
const ALL_SALONS = SALONS.concat(REVIEW_ONLY);
const DAYS = ['日','月','火','水','木','金','土'];

let allDates = [];
let curDate = '';
let curSalon = 'all';
let curView = 'all';
let cache = {};

async function init() {
  try {
    const r = await fetch(BASE + '/index.json');
    const d = await r.json();
    allDates = d.dates.sort().reverse();
  } catch {
    document.getElementById('content').innerHTML = '<div class="card"><p>index.json の読み込みに失敗しました。</p></div>';
    return;
  }

  const sel = document.getElementById('dateSelect');
  for (const d of allDates) {
    const o = document.createElement('option');
    o.value = d;
    const dt = new Date(d + 'T00:00:00');
    o.textContent = d + ' (' + DAYS[dt.getDay()] + ')';
    sel.appendChild(o);
  }
  sel.addEventListener('change', function() { loadDate(sel.value); });

  var tabs = document.getElementById('salonTabs');
  addTab(tabs, 'all', '全サロン', true);
  SALONS.forEach(function(s) { addTab(tabs, s.name, s.label, false); });

  document.getElementById('prevDate').addEventListener('click', function() { navDate(1); });
  document.getElementById('nextDate').addEventListener('click', function() { navDate(-1); });

  document.querySelectorAll('.nav-section .hbtn').forEach(function(b) {
    b.addEventListener('click', function() {
      curView = b.dataset.v;
      document.querySelectorAll('.nav-section .hbtn').forEach(function(x) { x.classList.remove('active'); });
      b.classList.add('active');
      render();
    });
  });

  // Load all dates' data upfront for analysis features
  await loadAllData();
  loadDate(allDates[0]);
}

function addTab(parent, id, label, active) {
  var b = document.createElement('button');
  b.className = 'tab' + (active ? ' active' : '');
  b.textContent = label;
  b.addEventListener('click', function() {
    curSalon = id;
    parent.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    b.classList.add('active');
    render();
  });
  parent.appendChild(b);
}

function navDate(off) {
  var i = allDates.indexOf(curDate) + off;
  if (i >= 0 && i < allDates.length) {
    document.getElementById('dateSelect').value = allDates[i];
    loadDate(allDates[i]);
  }
}

async function loadAllData() {
  var ps = [];
  for (var di = 0; di < allDates.length; di++) {
    var dd = allDates[di];
    if (cache[dd]) continue;
    cache[dd] = { salons: {}, reviews: null, diffHtml: null, prevReviews: null };
    (function(dateStr) {
      SALONS.forEach(function(s) {
        ps.push(fetchJson(BASE + '/' + dateStr + '/' + s.name + '_data.json').then(function(d) { cache[dateStr].salons[s.name] = d; }));
      });
      ps.push(fetchJson(BASE + '/' + dateStr + '/reviews.json').then(function(d) { cache[dateStr].reviews = d; }));
    })(dd);
  }
  await Promise.all(ps);
}

async function loadDate(dateStr) {
  curDate = dateStr;
  var idx = allDates.indexOf(dateStr);
  document.getElementById('prevDate').disabled = idx >= allDates.length - 1;
  document.getElementById('nextDate').disabled = idx <= 0;

  // Load diff report HTML if not cached
  var entry = cache[dateStr];
  if (entry && entry.diffHtml === null) {
    try {
      var r = await fetch(BASE + '/' + dateStr + '/diff_report.html');
      entry.diffHtml = r.ok ? await r.text() : undefined;
    } catch { entry.diffHtml = undefined; }
  }

  // Set prevReviews
  if (entry && idx < allDates.length - 1) {
    entry.prevReviews = cache[allDates[idx + 1]]?.reviews || null;
  }

  render();
}

async function fetchJson(url) {
  try { var r = await fetch(url); if (!r.ok) return null; return await r.json(); } catch { return null; }
}

// ===== Render =====
function filteredSalons() { return curSalon === 'all' ? SALONS : SALONS.filter(function(s){return s.name === curSalon;}); }
function filteredAllSalons() { return curSalon === 'all' ? ALL_SALONS : ALL_SALONS.filter(function(s){return s.name === curSalon;}); }

function render() {
  var entry = cache[curDate];
  if (!entry) return;
  var show = curSalon === 'all' ? SALONS : SALONS.filter(function(s) { return s.name === curSalon; });
  var html = '';

  if (curView === 'all' || curView === 'analysis') {
    if (entry.reviews) html += renderReviews(entry);
    html += renderCompareChart(entry);
    html += renderFilledYesterday(entry);
    // html += renderFillSpeed(); // 旧ロジック非表示
    html += renderFillCurve();
    html += renderWeekendPattern();
    html += renderTrendChart();
    html += renderReviewPace();
    html += renderBlogCount();
    html += renderReviewTimeline(entry);
  }

  if (curView === 'all' || curView === 'calendar') {
    show.forEach(function(s) {
      var d = entry.salons[s.name];
      if (!d) return;
      html += renderCalendar(s, d);
      html += renderWeeklySummary(s, d);
    });
    show.forEach(function(s) { html += renderScreenshots(s); });
  }

  if (curView === 'all' || curView === 'report') {
    if (entry.diffHtml) html += renderDiffReport(entry.diffHtml);
  }

  if (!html) html = '<div class="card"><p>データがありません。</p></div>';
  document.getElementById('content').innerHTML = html;
}

// ----- Reviews -----
function renderReviews(entry) {
  var h = '<div class="card"><h2>口コミ状況</h2><div class="rev-row">';
  filteredAllSalons().forEach(function(s) {
    var r = entry.reviews && entry.reviews.salons && entry.reviews.salons[s.name];
    if (!r) return;
    var dh = '';
    if (entry.prevReviews && entry.prevReviews.salons && entry.prevReviews.salons[s.name]) {
      var diff = r.reviewCount - entry.prevReviews.salons[s.name].reviewCount;
      dh = diff > 0 ? '<div class="diff-pos">+' + diff + '</div>' : diff === 0 ? '<div class="diff-zero">&plusmn;0</div>' : '<div class="diff-neg">' + diff + '</div>';
    }
    h += '<div class="rev-card"><div class="lbl">' + s.label + '</div><div class="cnt">' + r.reviewCount + '</div><div class="rt">' + stars(r.rating) + ' ' + r.rating + '</div>' + dh + '</div>';
  });
  h += '</div></div>';
  return h;
}

function stars(n) { var s = ''; for (var i = 0; i < Math.round(n); i++) s += '\u2605'; return s; }

// ----- 3 salon comparison -----
function renderCompareChart(entry) {
  var targets = filteredSalons();
  var weeksMap = {};
  targets.forEach(function(s) {
    var d = entry.salons[s.name];
    if (!d) return;
    Object.entries(d.slots).forEach(function(pair) {
      var ds = pair[0], ts = pair[1];
      var wk = weekKey(ds);
      if (!weeksMap[wk]) weeksMap[wk] = { sk: weekSortKey(ds) };
      if (!weeksMap[wk][s.name]) weeksMap[wk][s.name] = { total: 0, avail: 0 };
      Object.values(ts).forEach(function(st) {
        if (st === '-') return;
        weeksMap[wk][s.name].total++;
        if (st === '◎' || st === '○' || st === '△') weeksMap[wk][s.name].avail++;
      });
    });
  });
  var sorted = Object.entries(weeksMap).sort(function(a, b) { return a[1].sk - b[1].sk; });
  if (!sorted.length) return '';

  var title = curSalon === 'all' ? 'サロン比較 - 週別予約率' : targets[0].label + ' - 週別予約率';
  var h = '<div class="card"><h2>' + title + '</h2><table class="stbl"><tr><th>期間</th>';
  targets.forEach(function(s) { h += '<th>' + s.label + '</th>'; });
  h += '</tr>';
  sorted.forEach(function(pair) {
    var wk = pair[0], data = pair[1];
    h += '<tr><td style="white-space:nowrap">' + wk + '</td>';
    targets.forEach(function(s) {
      var sd = data[s.name];
      if (!sd || sd.total === 0) { h += '<td>-</td>'; return; }
      var bk = sd.total - sd.avail;
      var pct = ((bk / sd.total) * 100).toFixed(1);
      var c = pctColor(pct);
      h += '<td><div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%;background:' + c + '"></div><div class="bar-lbl">' + pct + '%</div></div></td>';
    });
    h += '</tr>';
  });
  h += '</table></div>';
  return h;
}

// ----- Filled yesterday (前日に埋まった枠) -----
function renderFilledYesterday(entry) {
  var idx = allDates.indexOf(curDate);
  if (idx >= allDates.length - 1) return '<div class="card"><h2>前日からの予約変動</h2><p style="color:var(--gray)">前日のデータがありません</p></div>';
  var prevDate = allDates[idx + 1];
  var prevEntry = cache[prevDate];
  if (!prevEntry) return '';

  var h = '<div class="card"><h2>前日からの予約変動</h2>';
  h += '<p style="font-size:11px;color:var(--gray);margin-bottom:8px">' + prevDate + ' → ' + curDate + ' で変化した枠</p>';
  h += '<table class="stbl"><tr><th>サロン</th><th>新規予約 (空き→×)</th><th>キャンセル (×→空き)</th><th>差引</th></tr>';

  var hasAny = false;
  filteredSalons().forEach(function(s) {
    var cur = entry.salons[s.name];
    var prev = prevEntry.salons[s.name];
    if (!cur || !prev) return;

    var filled = 0, cancelled = 0;
    var filledDetails = [], cancelDetails = [];
    Object.keys(cur.slots).forEach(function(slotDate) {
      if (!prev.slots[slotDate]) return;
      Object.keys(cur.slots[slotDate]).forEach(function(time) {
        var curSt = cur.slots[slotDate][time];
        var prevSt = prev.slots[slotDate] && prev.slots[slotDate][time];
        if (!prevSt || prevSt === '-' || curSt === '-') return;
        var wasAvail = (prevSt === '◎' || prevSt === '○' || prevSt === '△');
        var nowFull = (curSt === '×');
        var wasFull = (prevSt === '×');
        var nowAvail = (curSt === '◎' || curSt === '○' || curSt === '△');
        if (wasAvail && nowFull) {
          filled++;
          filledDetails.push(fmtDateShort(slotDate) + ' ' + time);
        }
        if (wasFull && nowAvail) {
          cancelled++;
          cancelDetails.push(fmtDateShort(slotDate) + ' ' + time);
        }
      });
    });

    hasAny = hasAny || filled > 0 || cancelled > 0;
    var net = filled - cancelled;
    var netColor = net > 0 ? 'var(--red)' : net < 0 ? 'var(--green)' : 'var(--gray)';
    var netStr = net > 0 ? '+' + net : '' + net;

    h += '<tr>';
    h += '<td style="font-weight:bold">' + s.label + '</td>';
    h += '<td style="text-align:center"><span style="font-size:18px;font-weight:bold;color:var(--red)">' + filled + '</span><span style="font-size:11px;color:var(--gray)">枠</span>';
    if (filledDetails.length > 0 && filledDetails.length <= 8) h += '<div style="font-size:10px;color:var(--gray);margin-top:2px">' + filledDetails.join(', ') + '</div>';
    h += '</td>';
    h += '<td style="text-align:center"><span style="font-size:18px;font-weight:bold;color:var(--green)">' + cancelled + '</span><span style="font-size:11px;color:var(--gray)">枠</span>';
    if (cancelDetails.length > 0 && cancelDetails.length <= 8) h += '<div style="font-size:10px;color:var(--gray);margin-top:2px">' + cancelDetails.join(', ') + '</div>';
    h += '</td>';
    h += '<td style="text-align:center;font-weight:bold;color:' + netColor + '">' + netStr + '</td>';
    h += '</tr>';
  });

  if (!hasAny) h += '<tr><td colspan="4" style="text-align:center;color:var(--gray)">変動なし</td></tr>';
  h += '</table></div>';
  return h;
}

// ----- Fill speed -----
function renderFillSpeed() {
  var sortedDates = allDates.slice().reverse();
  if (sortedDates.length < 2) return '<div class="card"><h2>予約が埋まるスピード分析</h2><p style="color:var(--gray)">2日以上のデータが必要です（データ蓄積中）</p></div>';

  var h = '<div class="card"><h2>予約が埋まるスピード分析</h2>';
  h += '<p style="font-size:11px;color:var(--gray);margin-bottom:8px">各枠が「空き\u2192\u00D7」に変わるまでの日数</p>';
  var hasAny = false;

  SALONS.forEach(function(salon) {
    var firstSeen = {};
    var filledOn = {};
    sortedDates.forEach(function(capDate) {
      var sd = cache[capDate] && cache[capDate].salons && cache[capDate].salons[salon.name];
      if (!sd) return;
      Object.entries(sd.slots).forEach(function(pair) {
        var slotDate = pair[0], ts = pair[1];
        Object.entries(ts).forEach(function(tp) {
          var time = tp[0], status = tp[1];
          if (status === '-') return;
          var k = slotDate + '|' + time;
          if ((status === '◎' || status === '○' || status === '△') && !firstSeen[k]) {
            firstSeen[k] = capDate;
          }
          if (status === '×' && firstSeen[k] && !filledOn[k]) {
            filledOn[k] = capDate;
          }
        });
      });
    });

    var wdDays = [], weDays = [];
    Object.entries(filledOn).forEach(function(pair) {
      var k = pair[0], fillDate = pair[1];
      var seenDate = firstSeen[k];
      if (!seenDate) return;
      var slotDate = k.split('|')[0];
      var days = daysBetween(seenDate, fillDate);
      if (days <= 0) return;
      var dow = new Date(slotDate + 'T00:00:00').getDay();
      if (dow === 0 || dow === 6) weDays.push(days);
      else wdDays.push(days);
    });

    if (wdDays.length === 0 && weDays.length === 0) return;
    hasAny = true;
    h += '<h3>' + salon.label + '</h3><div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">';
    if (wdDays.length > 0) {
      var avg = (wdDays.reduce(function(a, b) { return a + b; }, 0) / wdDays.length).toFixed(1);
      var med = median(wdDays);
      h += '<div class="rev-card"><div class="lbl">平日の枠</div><div class="cnt">' + avg + '</div><div class="lbl">平均 ' + avg + '日 / 中央値 ' + med + '日で埋まる (' + wdDays.length + '枠)</div></div>';
    }
    if (weDays.length > 0) {
      var avg2 = (weDays.reduce(function(a, b) { return a + b; }, 0) / weDays.length).toFixed(1);
      var med2 = median(weDays);
      h += '<div class="rev-card"><div class="lbl">土日の枠</div><div class="cnt">' + avg2 + '</div><div class="lbl">平均 ' + avg2 + '日 / 中央値 ' + med2 + '日で埋まる (' + weDays.length + '枠)</div></div>';
    }
    h += '</div>';
  });

  if (!hasAny) h += '<p style="color:var(--gray)">まだ枠の変化が検出されていません（データ蓄積中）</p>';
  h += '</div>';
  return h;
}

// ----- Fill curve: 予約率の埋まり方カーブ -----
function renderFillCurve() {
  var sortedDates = allDates.slice().reverse(); // 古い順
  if (sortedDates.length < 2) return '<div class="card"><h2>埋まり方カーブ</h2><p style="color:var(--gray)">2日以上のデータが必要です（データ蓄積中）</p></div>';

  // 各サロン × 各キャプチャ日: 「当日まであとN日」→ 予約率 を集める
  // 構造: salonData[salonName].weekday[daysAhead] = [rate, rate, ...]
  //        salonData[salonName].weekend[daysAhead] = [rate, rate, ...]
  var targets = filteredSalons();
  var salonData = {};
  targets.forEach(function(salon) {
    salonData[salon.name] = { weekday: {}, weekend: {} };
  });

  sortedDates.forEach(function(capDate) {
    var capTime = new Date(capDate + 'T00:00:00').getTime();
    targets.forEach(function(salon) {
      var sd = cache[capDate] && cache[capDate].salons && cache[capDate].salons[salon.name];
      if (!sd || !sd.slots) return;
      Object.entries(sd.slots).forEach(function(pair) {
        var slotDate = pair[0], ts = pair[1];
        var slotTime = new Date(slotDate + 'T00:00:00').getTime();
        var daysAhead = Math.round((slotTime - capTime) / 86400000);
        if (daysAhead < 0) return; // 過去の日付はスキップ

        var total = 0, booked = 0;
        Object.entries(ts).forEach(function(tp) {
          var status = tp[1];
          if (status === '-') return;
          total++;
          if (status === '×') booked++;
        });
        if (total === 0) return;
        var rate = Math.round(booked / total * 100);

        var dow = new Date(slotDate + 'T00:00:00').getDay();
        var bucket = (dow === 0 || dow === 6) ? salonData[salon.name].weekend : salonData[salon.name].weekday;
        if (!bucket[daysAhead]) bucket[daysAhead] = [];
        bucket[daysAhead].push(rate);
      });
    });
  });

  // daysAhead ごとの平均予約率を計算
  function calcAvg(bucket) {
    var result = {};
    Object.entries(bucket).forEach(function(pair) {
      var d = parseInt(pair[0]), vals = pair[1];
      var sum = 0;
      vals.forEach(function(v) { sum += v; });
      result[d] = Math.round(sum / vals.length);
    });
    return result;
  }

  // SVGチャート描画
  function buildCurveChart(type, label) {
    var W = 700, H = 250, PAD = 45;
    var chartW = W - PAD * 2, chartH = H - PAD * 2;

    // 全サロンのdaysAhead範囲を取得
    var allDays = [];
    targets.forEach(function(s) {
      var avg = calcAvg(salonData[s.name][type]);
      Object.keys(avg).forEach(function(d) { allDays.push(parseInt(d)); });
    });
    if (allDays.length === 0) return '';
    var maxDay = Math.max.apply(null, allDays);
    var minDay = Math.min.apply(null, allDays);
    if (maxDay <= minDay) return '';

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="max-width:' + W + 'px">';

    // Y軸グリッド (0%-100%)
    for (var gi = 0; gi <= 4; gi++) {
      var gy = PAD + chartH - (chartH * gi / 4);
      var gval = (gi * 25);
      svg += '<line x1="' + PAD + '" y1="' + gy + '" x2="' + (W - PAD) + '" y2="' + gy + '" stroke="#eee" stroke-width="1"/>';
      svg += '<text x="' + (PAD - 4) + '" y="' + (gy + 4) + '" text-anchor="end" font-size="9" fill="#999">' + gval + '%</text>';
    }

    // X軸ラベル（当日まであとN日 → 右が当日に近い）
    var step = maxDay > 30 ? 7 : maxDay > 14 ? 3 : 1;
    for (var xi = minDay; xi <= maxDay; xi += step) {
      var xx = PAD + chartW - (chartW * (xi - minDay) / (maxDay - minDay));
      svg += '<text x="' + xx + '" y="' + (H - 6) + '" text-anchor="middle" font-size="9" fill="#999">' + xi + '日前</text>';
    }

    // 各サロンのライン
    targets.forEach(function(s) {
      var avg = calcAvg(salonData[s.name][type]);
      // daysAhead降順（左が遠い未来、右が当日に近い）
      var days = Object.keys(avg).map(Number).sort(function(a, b) { return b - a; });
      if (days.length < 2) return;
      var pts = [];
      days.forEach(function(d) {
        var px = PAD + chartW - (chartW * (d - minDay) / (maxDay - minDay));
        var py = PAD + chartH - (chartH * avg[d] / 100);
        pts.push(px.toFixed(1) + ',' + py.toFixed(1));
      });
      svg += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + s.color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>';
    });

    svg += '</svg>';
    return '<p style="font-weight:600;margin:8px 0 4px">' + label + '</p><div style="overflow-x:auto">' + svg + '</div>';
  }

  var h = '<div class="card"><h2>埋まり方カーブ</h2>';
  h += '<p style="font-size:11px;color:var(--gray);margin-bottom:8px">「当日まであとN日」の時点で予約率が何%だったか（左が遠い未来、右が当日に近い）</p>';

  // 凡例
  h += '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:11px">';
  targets.forEach(function(s) {
    h += '<span><span style="display:inline-block;width:14px;height:3px;background:' + s.color + ';vertical-align:middle;margin-right:3px"></span>' + s.label + '</span>';
  });
  h += '</div>';

  h += buildCurveChart('weekday', '平日の枠');
  h += buildCurveChart('weekend', '土日の枠');

  h += '</div>';
  return h;
}

// ----- Weekend open pattern -----
function renderWeekendPattern() {
  var sortedDates = allDates.slice().reverse();
  if (sortedDates.length < 2) return '';
  var hasData = false;
  var h = '<div class="card"><h2>土日の後出し開放パターン</h2>';
  h += '<p style="font-size:11px;color:var(--gray);margin-bottom:8px">\u00D7\u2192\u25CE/\u25B3 に変わった土日枠の検出</p>';

  filteredSalons().forEach(function(salon) {
    var rows = [];
    for (var i = 1; i < sortedDates.length; i++) {
      var prevD = cache[sortedDates[i - 1]] && cache[sortedDates[i - 1]].salons && cache[sortedDates[i - 1]].salons[salon.name];
      var curD = cache[sortedDates[i]] && cache[sortedDates[i]].salons && cache[sortedDates[i]].salons[salon.name];
      if (!prevD || !curD) continue;
      var details = [];
      Object.entries(curD.slots).forEach(function(pair) {
        var slotDate = pair[0], ts = pair[1];
        var dow = new Date(slotDate + 'T00:00:00').getDay();

        var prevTs = prevD.slots[slotDate];

        });
      });

      h += '<tr><td>' + r.date + '</td><td style="text-align:center;font-weight:bold;color:var(--green)">' + r.count + '枠</td><td style="font-size:11px">' + r.details.join(', ') + '</td></tr>';
    });

  });

  if (!hasData) h += '<p style="color:var(--gray)">まだ土日の後出し開放は検出されていません（データ蓄積中）</p>';
  h += '</div>';
  return h;
}

function renderTrendChart() {

  revTargets.forEach(function(s) {
    h += '<span style="font-size:12px"><span style="display:inline-block;width:12px;height:12px;background:' + s.color + ';border-radius:2px;vertical-align:middle;margin-right:4px"></span>' + s.label + '</span>';
  });

}

function buildLineChart(dates, series, W, H, PAD, unit) {
  var chartW = W - PAD * 2, chartH = H - PAD * 2;
  var n = dates.length;
  if (n < 2) return '';

  var allVals = [];
  var seriesKeys = Object.keys(series);
  seriesKeys.forEach(function(k) {
    series[k].forEach(function(v) { if (v !== null) allVals.push(v); });
  });
  if (allVals.length === 0) return '<p style="color:var(--gray)">データなし</p>';

  var minV = Math.min.apply(null, allVals);
  var maxV = Math.max.apply(null, allVals);
  var range = maxV - minV || 1;
  minV = Math.max(0, minV - range * 0.05);
  maxV = maxV + range * 0.05;
  var rng = maxV - minV || 1;

  var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="max-width:' + W + 'px">';
  for (var gi = 0; gi <= 4; gi++) {
    var gy = PAD + chartH - (chartH * gi / 4);
    var gval = (minV + rng * gi / 4).toFixed(unit === '%' ? 1 : 0);
    svg += '<line x1="' + PAD + '" y1="' + gy + '" x2="' + (W - PAD) + '" y2="' + gy + '" stroke="#eee" stroke-width="1"/>';
    svg += '<text x="' + (PAD - 4) + '" y="' + (gy + 4) + '" text-anchor="end" font-size="9" fill="#999">' + gval + '</text>';
  }
  for (var xi = 0; xi < n; xi++) {
    var xx = PAD + (chartW * xi / (n - 1));
    svg += '<text x="' + xx + '" y="' + (H - 6) + '" text-anchor="middle" font-size="9" fill="#999">' + dates[xi].slice(5) + '</text>';
  }
  var salonLookup = {};
  ALL_SALONS.forEach(function(s) { salonLookup[s.name] = s; });
  seriesKeys.forEach(function(k) {
    var s = salonLookup[k];
    if (!s) return;
    var pts = [];
    for (var i = 0; i < n; i++) {
      var v = series[k][i];
      if (v === null) continue;
      var px = PAD + (chartW * i / (n - 1));
      var py = PAD + chartH - ((v - minV) / rng * chartH);
      pts.push(px.toFixed(1) + ',' + py.toFixed(1));
    }
    if (pts.length > 1) {
      svg += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + s.color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
      pts.forEach(function(p) {
        var xy = p.split(',');
        svg += '<circle cx="' + xy[0] + '" cy="' + xy[1] + '" r="3" fill="' + s.color + '"/>';
      });
    }
  });
  svg += '</svg>';
  return svg;
}

// ----- Review pace comparison -----
function renderReviewPace() {
  var sortedDates = allDates.slice().reverse();
  if (sortedDates.length < 2) return '';

  // Calculate daily/weekly growth for each salon
  var h = '<div class="card"><h2>口コミ増加ペース比較</h2>';
  h += '<p style="font-size:11px;color:var(--gray);margin-bottom:8px">各サロンの口コミ増加速度。投稿日ベースで来店頻度を推定</p>';

  // Build table: per salon, show total count, daily average, weekly average, monthly estimate
  var firstDate = sortedDates[0];
  var lastDate = sortedDates[sortedDates.length - 1];
  var spanDays = daysBetween(firstDate, lastDate) || 1;

  h += '<table class="stbl"><tr><th>サロン</th><th>現在の口コミ数</th><th>観測期間の増加</th><th>日平均</th><th>週ペース</th><th>月ペース(推定)</th><th>推定月間来客数</th></tr>';

  filteredAllSalons().forEach(function(s) {
    var firstRev = cache[firstDate] && cache[firstDate].reviews && cache[firstDate].reviews.salons && cache[firstDate].reviews.salons[s.name];
    var lastRev = cache[lastDate] && cache[lastDate].reviews && cache[lastDate].reviews.salons && cache[lastDate].reviews.salons[s.name];
    if (!firstRev || !lastRev) return;

    // Use most recent and oldest data we have
    var newestCount = 0, oldestCount = Infinity;
    sortedDates.forEach(function(d) {
      var rv = cache[d] && cache[d].reviews && cache[d].reviews.salons && cache[d].reviews.salons[s.name];
      if (rv) {
        if (rv.reviewCount > newestCount) newestCount = rv.reviewCount;
        if (rv.reviewCount < oldestCount) oldestCount = rv.reviewCount;
      }
    });

    var increase = newestCount - oldestCount;
    var daily = (increase / spanDays).toFixed(2);
    var weekly = (increase / spanDays * 7).toFixed(1);
    var monthly = (increase / spanDays * 30).toFixed(0);
    // Estimate: if ~20-30% of customers leave reviews
    var estimatedCustomers = Math.round(parseFloat(monthly) / 0.25);

    var color = parseFloat(monthly) >= 15 ? 'var(--red)' : parseFloat(monthly) >= 8 ? 'var(--orange)' : 'var(--green)';
    h += '<tr>';
    h += '<td style="font-weight:bold">' + s.label + '</td>';
    h += '<td style="text-align:center">' + newestCount + '件</td>';
    h += '<td style="text-align:center;font-weight:bold;color:' + color + '">+' + increase + '件/' + spanDays + '日</td>';
    h += '<td style="text-align:center">' + daily + '件/日</td>';
    h += '<td style="text-align:center;font-weight:bold">' + weekly + '件/週</td>';
    h += '<td style="text-align:center;font-weight:bold;color:' + color + '">' + monthly + '件/月</td>';
    h += '<td style="text-align:center;color:var(--gray)">\u2248' + estimatedCustomers + '人/月</td>';
    h += '</tr>';
  });
  h += '</table>';
  h += '<p style="font-size:10px;color:var(--gray);margin-top:4px">※推定来客数は口コミ投稿率25%と仮定した概算値です</p>';
  h += '</div>';
  return h;
}

// ----- Calendar -----
function renderCalendar(salon, data) {
  var slots = data.slots;
  var sd = Object.keys(slots).sort();
  if (!sd.length) return '';
  var allT = {};
  sd.forEach(function(d) { Object.keys(slots[d]).forEach(function(t) { allT[t] = true; }); });
  var times = Object.keys(allT).sort();

  var h = '<div class="card"><h2>' + salon.label + ' - 空き状況カレンダー</h2><div class="cal-scroll">';
  h += '<div class="cal-grid" style="grid-template-columns:50px repeat(' + sd.length + ',minmax(36px,1fr))">';
  h += '<div class="cal-hdr"></div>';
  sd.forEach(function(d) {
    var dt = new Date(d + 'T00:00:00');
    var dow = dt.getDay();
    h += '<div class="cal-hdr' + (dow === 0 || dow === 6 ? ' we' : '') + '">' + (dt.getMonth() + 1) + '/' + dt.getDate() + '<br>' + DAYS[dow] + '</div>';
  });
  times.forEach(function(t) {
    h += '<div class="cal-cell cal-time">' + t + '</div>';
    sd.forEach(function(d) {
      var st = (slots[d] && slots[d][t]) || '-';
      var cls = 'cal-cell ', disp = st;
      if (st === '◎' || st === '○') { cls += 's-avail'; disp = '◎'; }
      else if (st === '△') cls += 's-few';
      else if (st === '×') cls += 's-full';
      else { cls += 's-closed'; disp = '-'; }
      h += '<div class="' + cls + '">' + disp + '</div>';
    });
  });
  h += '</div></div></div>';
  return h;
}

// ----- Weekly summary -----
function renderWeeklySummary(salon, data) {
  var weeks = {};
  Object.entries(data.slots).forEach(function(pair) {
    var ds = pair[0], ts = pair[1];
    var wk = weekKey(ds);
    if (!weeks[wk]) weeks[wk] = { total: 0, avail: 0, sk: weekSortKey(ds) };
    Object.values(ts).forEach(function(st) {
      if (st === '-') return;
      weeks[wk].total++;
      if (st === '◎' || st === '○' || st === '△') weeks[wk].avail++;
    });
  });
  var sorted = Object.entries(weeks).sort(function(a, b) { return a[1].sk - b[1].sk; });
  if (!sorted.length) return '';
  var h = '<div class="card"><h2>' + salon.label + ' - 週別予約率</h2><table class="stbl"><tr><th>期間</th><th>予約状況</th><th>予約率</th></tr>';
  sorted.forEach(function(pair) {
    var lbl = pair[0], s = pair[1];
    if (!s.total) return;
    var bk = s.total - s.avail, pct = ((bk / s.total) * 100).toFixed(1), c = pctColor(pct);
    h += '<tr><td style="white-space:nowrap">' + lbl + '</td><td><div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%;background:' + c + '"></div><div class="bar-lbl">' + bk + '/' + s.total + '</div></div></td><td style="text-align:right;font-weight:bold;color:' + c + '">' + pct + '%</td></tr>';
  });
  h += '</table></div>';
  return h;
}

// ----- Screenshots -----
function renderScreenshots(salon) {
  var h = '<div class="card"><h2>' + salon.label + ' - スクリーンショット</h2><div class="ss-grid">';
  for (var w = 0; w <= 5; w++) {
    h += '<img src="' + BASE + '/' + curDate + '/' + salon.name + '_week' + w + '.png" alt="week' + w + '" loading="lazy" onerror="this.style.display=\'none\'" onclick="openModal(this.src)">';
  }
  h += '</div></div>';
  return h;
}

// ----- Diff report -----
function renderDiffReport(html) {
  return '<div class="card"><h2>差分レポート</h2><div class="diff-frame"><iframe srcdoc="' + esc(html) + '"></iframe></div></div>';
}

// ===== Utils =====
function weekKey(ds) {
  var d = new Date(ds + 'T00:00:00');
  var dow = d.getDay();
  var mo = dow === 0 ? -6 : 1 - dow;
  var mon = new Date(d); mon.setDate(mon.getDate() + mo);
  var sun = new Date(mon); sun.setDate(sun.getDate() + 6);
  return fmtS(mon) + '-' + fmtS(sun);
}
function weekSortKey(ds) {
  var d = new Date(ds + 'T00:00:00');
  var dow = d.getDay();
  var mo = dow === 0 ? -6 : 1 - dow;
  var mon = new Date(d); mon.setDate(mon.getDate() + mo);
  return mon.getTime();
}
function fmtS(d) { return (d.getMonth() + 1) + '/' + String(d.getDate()).padStart(2, '0'); }
function fmtDateShort(ds) {
  var d = new Date(ds + 'T00:00:00');
  return (d.getMonth() + 1) + '/' + d.getDate() + '(' + DAYS[d.getDay()] + ')';
}
function pctColor(p) {
  var n = parseFloat(p);
  if (n >= 90) return 'var(--red)'; if (n >= 70) return 'var(--orange)';
  if (n >= 50) return 'var(--yellow)'; return 'var(--green)';
}
function esc(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function daysBetween(a, b) {
  return Math.round((new Date(b + 'T00:00:00') - new Date(a + 'T00:00:00')) / 86400000);
}
function median(arr) {
  var s = arr.slice().sort(function(a, b) { return a - b; });
  var mid = Math.floor(s.length / 2);
  return s.length % 2 ? s[mid] : ((s[mid - 1] + s[mid]) / 2).toFixed(1);
}
function openModal(src) { document.getElementById('modalImg').src = src; document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

init();
</script>
